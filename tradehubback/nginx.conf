upstream frappe_gunicorn {
    server backend-gunicorn:8000;
}

server {
    listen 8000;
    server_name _;

    # Frappe statik assets
    location /assets/ {
        alias /home/frappe/frappe-bench/sites/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Site public dosyalar
    location /files/ {
        alias /home/frappe/frappe-bench/sites/tradehub.localhost/public/;
        try_files $uri =404;
    }

    # Tüm dinamik istekler gunicorn'a
    location / {
        proxy_pass http://frappe_gunicorn;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_buffering off;
        client_max_body_size 50m;
    }
}
